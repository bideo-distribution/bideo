server:
  port: 10000
  servlet:
    session:
      tracking-modes: cookie
  forward-headers-strategy: native
  tomcat:
    # multipart 업로드 시 Tomcat 자체 한도가 더 작으면 connector 가 stream 을 미리 끊어
    # "Stream ended unexpectedly" 가 발생함. Spring multipart 한도와 같이 풀어준다.
    max-http-form-post-size: 100MB
    max-swallow-size: 100MB

spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${EC2_HOST}:${PSQL_PORT}/${PSQL_DATABASE}?serverTimezone=Asia/Seoul
    username: ${PSQL_USERNAME}
    password: ${PSQL_PASSWORD}
  session:
    redis:
      repository-type: indexed
      flush-mode: immediate
  data:
    redis:
      host: ${EC2_HOST}
      port: ${REDIS_PORT}

  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}

  cache:
    type: redis

  profiles:
    active: local
    include: oauth, sol, boot

  servlet:
    multipart:
      enabled: true
      file-size-threshold: 2MB    # 메모리→디스크 임계점 — 작게 잡아 큰 파일은 임시파일로 빨리 옮김
      max-file-size: 100MB
      max-request-size: 100MB

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.app.bideo.domain; com.app.bideo.dto;
  type-handlers-package: com.app.bideo.mybatis.handler
  configuration:
    map-underscore-to-camel-case: true

# openssl rand -base64 32
jwt:
  secret: ${JWT_SECRET}

aws:
  access-key: ${AWS_ACCESS_KEY}
  secret-key: ${AWS_SECRET_KEY}
  s3:
    bucket-name: ${AWS_BUCKET_NAME}
  region: ${AWS_REGION}

ml:
  api:
    base-url: ${ML_API_BASE_URL}
    connect-timeout: 3000
    read-timeout: 30000

app:
  websocket:
    broker:
      relay:
        enabled: false
        host: localhost
        port: 61613
        client-login: guest
        client-passcode: guest
        system-login: guest
        system-passcode: guest
