name: Deploy to EC2

on:
  push:
    branches:
      - master

jobs:
  deploy:
    if: github.repository == 'bideo-distribution/bideo'
    runs-on: ubuntu-24.04

    strategy:
      matrix:
        include:
          - name: EC2_HOST1
          - name: EC2_HOST2

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set HOST env var from secrets
        run: echo "HOST=${{ secrets[matrix.name] }}" >> $GITHUB_ENV

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $HOST >> ~/.ssh/known_hosts

      - name: Copy project to EC2
        run: |
          rsync -avz --delete --delete-excluded \
            --exclude='.git' \
            --exclude='.idea' \
            --exclude='.gradle' \
            --exclude='build' \
            --exclude='out' \
            --exclude='.vscode' \
            --exclude='.claude' \
            -e "ssh -i ~/.ssh/id_rsa" . ${{ secrets.EC2_USER }}@$HOST:/home/ubuntu/bideo

      - name: Build & Run Docker on EC2
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.EC2_USER }}@$HOST << EOF
            cd /home/ubuntu/bideo
            docker stop bideo || true
            docker rm bideo || true
            docker rmi bideo || true
            docker build \
              --build-arg EC2_HOST=${{ secrets.EC2_HOST }} \
              --build-arg PSQL_PORT=${{ secrets.PSQL_PORT }} \
              --build-arg PSQL_DATABASE=${{ secrets.PSQL_DATABASE }} \
              --build-arg PSQL_USERNAME=${{ secrets.PSQL_USERNAME }} \
              --build-arg PSQL_PASSWORD=${{ secrets.PSQL_PASSWORD }} \
              --build-arg REDIS_PORT=${{ secrets.REDIS_PORT }} \
              --build-arg JWT_SECRET=${{ secrets.JWT_SECRET }} \
              --build-arg AWS_ACCESS_KEY=${{ secrets.AWS_ACCESS_KEY }} \
              --build-arg AWS_SECRET_KEY=${{ secrets.AWS_SECRET_KEY }} \
              --build-arg AWS_BUCKET_NAME=${{ secrets.AWS_BUCKET_NAME }} \
              --build-arg AWS_REGION=${{ secrets.AWS_REGION }} \
              --build-arg KAKAO_CLIENT_ID=${{ secrets.KAKAO_CLIENT_ID }} \
              --build-arg KAKAO_CLIENT_SECRET=${{ secrets.KAKAO_CLIENT_SECRET }} \
              --build-arg NAVER_CLIENT_ID=${{ secrets.NAVER_CLIENT_ID }} \
              --build-arg NAVER_CLIENT_SECRET=${{ secrets.NAVER_CLIENT_SECRET }} \
              --build-arg GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }} \
              --build-arg GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }} \
              --build-arg BOOTPAY_JS_API_KEY=${{ secrets.BOOTPAY_JS_API_KEY }} \
              --build-arg BOOTPAY_REST_API_KEY=${{ secrets.BOOTPAY_REST_API_KEY }} \
              --build-arg BOOTPAY_PRIVATE_KEY=${{ secrets.BOOTPAY_PRIVATE_KEY }} \
              --build-arg SPRING_MAIL_USERNAME=${{ secrets.SPRING_MAIL_USERNAME }} \
              --build-arg SPRING_MAIL_PASSWORD=${{ secrets.SPRING_MAIL_PASSWORD }} \
              --build-arg APP_MAIL_FROM_ADDRESS=${{ secrets.APP_MAIL_FROM_ADDRESS }} \
              --build-arg SOLAPI_API_KEY=${{ secrets.SOLAPI_API_KEY }} \
              --build-arg SOLAPI_API_SECRET=${{ secrets.SOLAPI_API_SECRET }} \
              --build-arg SOLAPI_FROM_NUMBER=${{ secrets.SOLAPI_FROM_NUMBER }} \
              --build-arg ML_API_BASE_URL=${{ secrets.ML_API_BASE_URL }} \
              -t bideo .
            docker run -d -p 80:10000 --name bideo \
              -e EC2_HOST=${{ secrets.EC2_HOST }} \
              -e PSQL_PORT=${{ secrets.PSQL_PORT }} \
              -e PSQL_DATABASE=${{ secrets.PSQL_DATABASE }} \
              -e PSQL_USERNAME=${{ secrets.PSQL_USERNAME }} \
              -e PSQL_PASSWORD=${{ secrets.PSQL_PASSWORD }} \
              -e REDIS_PORT=${{ secrets.REDIS_PORT }} \
              -e JWT_SECRET=${{ secrets.JWT_SECRET }} \
              -e AWS_ACCESS_KEY=${{ secrets.AWS_ACCESS_KEY }} \
              -e AWS_SECRET_KEY=${{ secrets.AWS_SECRET_KEY }} \
              -e AWS_BUCKET_NAME=${{ secrets.AWS_BUCKET_NAME }} \
              -e AWS_REGION=${{ secrets.AWS_REGION }} \
              -e KAKAO_CLIENT_ID=${{ secrets.KAKAO_CLIENT_ID }} \
              -e KAKAO_CLIENT_SECRET=${{ secrets.KAKAO_CLIENT_SECRET }} \
              -e NAVER_CLIENT_ID=${{ secrets.NAVER_CLIENT_ID }} \
              -e NAVER_CLIENT_SECRET=${{ secrets.NAVER_CLIENT_SECRET }} \
              -e GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }} \
              -e GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }} \
              -e BOOTPAY_JS_API_KEY=${{ secrets.BOOTPAY_JS_API_KEY }} \
              -e BOOTPAY_REST_API_KEY=${{ secrets.BOOTPAY_REST_API_KEY }} \
              -e BOOTPAY_PRIVATE_KEY=${{ secrets.BOOTPAY_PRIVATE_KEY }} \
              -e SPRING_MAIL_USERNAME=${{ secrets.SPRING_MAIL_USERNAME }} \
              -e SPRING_MAIL_PASSWORD=${{ secrets.SPRING_MAIL_PASSWORD }} \
              -e APP_MAIL_FROM_ADDRESS=${{ secrets.APP_MAIL_FROM_ADDRESS }} \
              -e SOLAPI_API_KEY=${{ secrets.SOLAPI_API_KEY }} \
              -e SOLAPI_API_SECRET=${{ secrets.SOLAPI_API_SECRET }} \
              -e SOLAPI_FROM_NUMBER=${{ secrets.SOLAPI_FROM_NUMBER }} \
              -e ML_API_BASE_URL=${{ secrets.ML_API_BASE_URL }} \
              bideo
          EOF

      - name: Clean up dangling images
        if: success()
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.EC2_USER }}@$HOST << 'EOF'
            docker image prune -f
            docker container prune -f
          EOF
